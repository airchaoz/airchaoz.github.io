<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Changelog · 目录导航</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #1d1d1f;
      --ink-2: #424245;
      --ink-muted: #6e6e73;
      --ink-faint: #86868b;
      --primary: #cc785c;
      --hairline: #d2d2d7;
      --hairline-soft: #e8e8ed;

      /* 与内容页统一 */
      --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --font-text: "SF Pro Text", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;

      --sidebar-w: 320px;
      --sidebar-pad-x: 22px;
      --header-bg: rgba(255, 255, 255, 0.72);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --ink: #f5f5f7;
        --ink-2: #d1d1d6;
        --ink-muted: #a1a1a6;
        --ink-faint: #6e6e73;
        --primary: #e8997c;
        --hairline: #38383a;
        --hairline-soft: #2c2c2e;
        --header-bg: rgba(0, 0, 0, 0.72);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--font-text);
      font-size: 17px;
      line-height: 1.5;
      letter-spacing: -0.374px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: var(--ink);
      background: var(--bg);
      overflow-x: hidden;
    }

    /* ===== Sidebar（与 iframe 同色，左侧固定栏） ===== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      padding: 28px 0 32px;
      background: var(--bg);
      border-right: 1px solid var(--hairline-soft);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      pointer-events: auto;
    }

    /* iframe 走 in-flow，外层 body 自然滚动；2:8 布局 */
    .viewer {
      display: block;
      width: 80vw;
      margin-left: 20vw;
      border: 0;
      background: var(--bg);
    }

    .sidebar-header {
      flex-shrink: 0;
      padding: 18px var(--sidebar-pad-x);
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--bg);
      border-bottom: 1px solid var(--hairline-soft);
    }

    .sidebar-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .sidebar-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink-2);
    }

    .nav-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 4px 0 16px;
      /* Firefox: 始终预留 4px 位置，颜色默认透明 */
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }

    /* WebKit: 默认透明胶囊，hover/滚动时显形 */
    .nav-list::-webkit-scrollbar {
      width: 4px;
      background: transparent;
    }
    .nav-list::-webkit-scrollbar-track { background: transparent; }
    .nav-list::-webkit-scrollbar-thumb {
      background-color: transparent;
      border-radius: 999px;
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0,
        black 20px,
        black calc(100% - 20px),
        transparent 100%
      );
              mask-image: linear-gradient(
        to bottom,
        transparent 0,
        black 20px,
        black calc(100% - 20px),
        transparent 100%
      );
      transition: background-color 0.28s ease;
    }

    /* 显形条件：hover 侧栏 或 正在滚动（.scrolling 由 JS 控制） */
    .nav-list:hover { scrollbar-color: var(--ink-faint) transparent; }
    .nav-list:hover::-webkit-scrollbar-thumb,
    .nav-list.scrolling::-webkit-scrollbar-thumb {
      background-color: var(--ink-faint);
    }

    .nav-item {
      position: relative;
      display: block;
      padding: 5px var(--sidebar-pad-x);
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink-2);
      text-decoration: none;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-item:hover { color: var(--ink); }

    .nav-item.active {
      color: var(--primary);
      border-left-color: var(--primary);
      font-weight: 500;
    }

    /* ===== Topbar（仅移动端） ===== */
    .topbar {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 30;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .hamburger {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--hairline);
      border-radius: 8px;
      cursor: pointer;
      color: var(--ink-2);
      font-size: 18px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .hamburger:hover { color: var(--ink); border-color: var(--ink-faint); }

    /* ===== Mobile ===== */
    .backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 8;
    }

    @media (max-width: 720px) {
      :root { --sidebar-w: 84vw; }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        background: var(--bg);
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        z-index: 60;
      }
      .sidebar.open { transform: translateX(0); }
      .backdrop.show { display: block; }
      .topbar { display: flex; }
    }
  </style>
</head>
<body>
  <iframe class="viewer" id="viewer" title="Changelog Viewer"></iframe>

  <aside class="sidebar" id="sidebar" aria-label="版本目录">
    <div class="sidebar-header">
      <span class="sidebar-eyebrow">Changelog</span>
      <h1 class="sidebar-title">Claude Code 版本导航</h1>
    </div>
    <nav class="nav-list" id="navList"></nav>
  </aside>

  <div class="topbar">
    <button class="hamburger" id="hamburger" aria-label="打开目录">☰</button>
  </div>

  <div class="backdrop" id="backdrop"></div>

  <script>
    (function () {
      const sidebar = document.getElementById('sidebar');
      const navList = document.getElementById('navList');
      const viewer = document.getElementById('viewer');
      const hamburger = document.getElementById('hamburger');
      const backdrop = document.getElementById('backdrop');

      let versions = [];
      let currentFile = null;
      let resizeRaf = 0;

      // ===== Load versions.json =====
      fetch('versions.json', { cache: 'no-cache' })
        .then((r) => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then((data) => {
          versions = data;
          renderNav();
          loadVersion(versions[0].file, versions[0].label, false);
        })
        .catch((err) => {
          console.error('加载 versions.json 失败：', err);
        });

      // ===== Render sidebar nav =====
      function renderNav() {
        const frag = document.createDocumentFragment();
        versions.forEach((v) => {
          const a = document.createElement('a');
          a.className = 'nav-item';
          a.href = '#';
          a.dataset.file = v.file;
          a.title = v.label;
          a.textContent = v.label;
          a.addEventListener('click', (e) => {
            e.preventDefault();
            loadVersion(v.file, v.label, true);
          });
          frag.appendChild(a);
        });
        navList.innerHTML = '';
        navList.appendChild(frag);
      }

      // ===== Load version into iframe =====
      function loadVersion(file, label, scrollIntoView) {
        if (file === currentFile) {
          adjustHeight();
          if (scrollIntoView) closeMobileSidebar();
          return;
        }
        currentFile = file;
        viewer.src = file;
        document.title = label + ' · Claude Code Changelog';

        document.querySelectorAll('.nav-item').forEach((el) => {
          el.classList.toggle('active', el.dataset.file === file);
        });

        if (scrollIntoView) {
          window.scrollTo(0, 0);
          const active = document.querySelector('.nav-item.active');
          if (active) active.scrollIntoView({ block: 'nearest' });
          closeMobileSidebar();
        }
      }

      // ===== iframe height adaptation =====
      function adjustHeight() {
        try {
          const doc = viewer.contentWindow && viewer.contentWindow.document;
          if (!doc) return;
          const body = doc.body;
          // 仅用 body.scrollHeight：standards 模式下 <html> 会撑满 iframe，
          // 导致 documentElement.scrollHeight/offsetHeight 被 iframe 自身高度污染，
          // 形成"越测越大"的反馈循环。body 无 height 时独立于 iframe 尺寸。
          const h = body ? body.scrollHeight : doc.documentElement.scrollHeight;
          if (h > 0) viewer.style.height = h + 'px';
        } catch (e) {}
      }

      viewer.addEventListener('load', () => {
        adjustHeight();
        setTimeout(adjustHeight, 50);
        setTimeout(adjustHeight, 200);
        setTimeout(adjustHeight, 600);
        try {
          const body = viewer.contentWindow.document.body;
          if (body && typeof ResizeObserver !== 'undefined') {
            const ro = new ResizeObserver(() => {
              cancelAnimationFrame(resizeRaf);
              resizeRaf = requestAnimationFrame(adjustHeight);
            });
            ro.observe(body);
          }
        } catch (e) {}
      });

      window.addEventListener('resize', () => {
        cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(adjustHeight);
      });

      // ===== Scrollbar auto-hide (macOS 风) =====
      let scrollTimer = 0;
      navList.addEventListener('scroll', () => {
        navList.classList.add('scrolling');
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          navList.classList.remove('scrolling');
        }, 800);
      });

      // ===== Mobile sidebar =====
      function openMobileSidebar() {
        sidebar.classList.add('open');
        backdrop.classList.add('show');
      }
      function closeMobileSidebar() {
        sidebar.classList.remove('open');
        backdrop.classList.remove('show');
      }
      hamburger.addEventListener('click', openMobileSidebar);
      backdrop.addEventListener('click', closeMobileSidebar);
    })();
  </script>
</body>
</html>
