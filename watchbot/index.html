<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchBot</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #fbfbfd;
      --ink: #1d1d1d;
      --ink-2: #424245;
      --ink-muted: #6e6e73;
      --ink-faint: #86868b;
      --primary: #0066cc;
      --hairline: #d2d2d7;
      --hairline-soft: #e8e8ed;
      --shadow-2: 0 4px 12px rgba(0, 0, 0, 0.04), 0 12px 32px rgba(0, 0, 0, 0.06);
      --r-md: 12px;
      --r-lg: 18px;
      --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --font-text: "SF Pro Text", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --bg-soft: #0a0a0a;
        --ink: #f5f5f7;
        --ink-2: #d1d1d6;
        --ink-muted: #a1a1a6;
        --ink-faint: #6e6e73;
        --primary: #4d9aff;
        --hairline: #38383a;
        --hairline-soft: #1c1c1e;
        --shadow-2: 0 4px 12px rgba(0, 0, 0, 0.4), 0 12px 32px rgba(0, 0, 0, 0.3);
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: var(--font-text);
      font-size: 17px;
      line-height: 1.5;
      letter-spacing: -0.374px;
      -webkit-font-smoothing: antialiased;
      color: var(--ink);
    }
    body {
      background:
        radial-gradient(ellipse 70% 50% at 85% -8%, rgba(0, 102, 204, 0.10), transparent 55%),
        radial-gradient(ellipse 55% 45% at -5% 25%, rgba(124, 58, 237, 0.08), transparent 55%),
        radial-gradient(ellipse 80% 40% at 50% 100%, rgba(0, 102, 204, 0.04), transparent 60%),
        var(--bg);
      background-attachment: fixed;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(ellipse 70% 50% at 85% -8%, rgba(77, 154, 255, 0.22), transparent 55%),
          radial-gradient(ellipse 55% 45% at -5% 25%, rgba(124, 58, 237, 0.18), transparent 55%),
          radial-gradient(ellipse 80% 40% at 50% 100%, rgba(77, 154, 255, 0.08), transparent 60%),
          #000000;
      }
    }

    .page { max-width: 1200px; margin: 0 auto; padding: 0 40px; position: relative; }

    /* ===== HERO ===== */
    .hero {
      padding: 96px 0 88px;
      position: relative;
      isolation: isolate;
    }
    .hero::before {
      content: "";
      position: absolute;
      top: -40px; left: -10%; right: -10%; bottom: -20px;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      -webkit-mask-image: radial-gradient(ellipse 60% 75% at 50% 30%, black, transparent 85%);
      mask-image: radial-gradient(ellipse 60% 75% at 50% 30%, black, transparent 85%);
      z-index: -1;
      pointer-events: none;
    }
    @media (prefers-color-scheme: dark) {
      .hero::before {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      }
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--primary);
      margin-bottom: 28px;
    }
    .hero-eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: var(--primary);
    }
    .hero h1 {
      margin: 0 0 28px;
      font-family: var(--font-display);
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: -0.04em;
    }
    .hero h1 .grad {
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .hero-sub {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 26px);
      line-height: 1.4;
      color: var(--ink-muted);
      max-width: 720px;
      letter-spacing: -0.01em;
    }

    /* ===== DIVIDER ===== */
    .divider {
      height: 1px;
      margin: 0 0 56px;
      background: linear-gradient(90deg, transparent 0%, var(--hairline) 25%, var(--hairline) 75%, transparent 100%);
    }

    /* ===== RICH-FEATURES GRID ===== */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .project-card {
      position: relative;
      display: flex;
      flex-direction: column;
      padding: 28px 24px 24px;
      background: var(--bg);
      border: 1px solid var(--hairline-soft);
      border-radius: var(--r-lg);
      text-decoration: none;
      color: inherit;
      min-height: 220px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .project-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--card-accent, var(--primary)) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .project-card:hover {
      border-color: var(--hairline);
      transform: translateY(-2px);
      box-shadow: var(--shadow-2);
    }
    .project-card:hover::before { opacity: 1; }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--card-accent, var(--primary));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    .card-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--card-accent, var(--primary));
      margin-bottom: 8px;
    }
    .card-title {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .card-desc {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink-muted);
      flex: 1;
    }
    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-faint);
      letter-spacing: 0.05em;
      transition: color 0.2s, gap 0.2s;
      margin-top: auto;
    }
    .project-card:hover .card-cta { color: var(--card-accent, var(--primary)); gap: 10px; }
    .card-cta::after { content: "→"; }

    .empty {
      grid-column: 1 / -1;
      color: var(--ink-muted);
      font-size: 14px;
      padding: 24px 0;
    }

    /* ===== FOOTER ===== */
    .footer {
      margin-top: 96px;
      padding: 28px 0;
      border-top: 1px solid var(--hairline-soft);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--ink-faint);
      letter-spacing: 0.05em;
    }
    .footer a { color: var(--ink-muted); text-decoration: none; }
    .footer a:hover { color: var(--ink); }

    @media (max-width: 860px) {
      .page { padding: 0 20px; }
      .project-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 540px) {
      .project-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">

    <section class="hero">
      <div class="hero-eyebrow">⌘ WatchBot</div>
      <h1><span class="grad">Projects.</span></h1>
      <p class="hero-sub">持续追踪软件更新，自动归档为可索引的静态站点。</p>
    </section>

    <div class="divider" aria-hidden="true"></div>

    <div class="project-grid" id="projectGrid"></div>

    <footer class="footer">
      <div>© 2026 WatchBot</div>
      <div><a href="#">GitHub</a> · <a href="#">About</a></div>
    </footer>
  </main>

  <template id="projectCardTemplate">
    <a class="project-card">
      <div class="card-icon"></div>
      <div class="card-meta"></div>
      <h3 class="card-title"></h3>
      <p class="card-desc"></p>
      <span class="card-cta">进入</span>
    </a>
  </template>

  <script>
    (async function () {
      const grid = document.getElementById('projectGrid');
      const tpl = document.getElementById('projectCardTemplate');

      let projects = [];
      try {
        const res = await fetch('projects.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        projects = await res.json();
      } catch (err) {
        console.error('加载 projects.json 失败：', err);
        grid.innerHTML = '<p class="empty">项目列表加载失败。</p>';
        return;
      }

      if (!Array.isArray(projects) || projects.length === 0) {
        grid.innerHTML = '<p class="empty">暂无项目。</p>';
        return;
      }

      const frag = document.createDocumentFragment();
      projects.forEach((p) => {
        const node = tpl.content.cloneNode(true);
        const link = node.querySelector('.project-card');
        link.href = (p.folder || p.name) + '/index.html';
        if (p.accent) link.style.setProperty('--card-accent', p.accent);
        node.querySelector('.card-icon').textContent =
          p.icon || (p.name || '?').charAt(0).toUpperCase();
        node.querySelector('.card-meta').textContent =
          'Project · ' + String(p.id || '?').padStart(2, '0');
        node.querySelector('.card-title').textContent = p.name || '';
        node.querySelector('.card-desc').textContent = p.description || '';
        frag.appendChild(node);
      });
      grid.replaceChildren(frag);
    })();
  </script>
</body>
</html>
